<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>הפסקות טבחים</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1d2328">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הפסקות טבח">
<link rel="apple-touch-icon" href="./icon-192.png">

<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&family=Oswald:wght@500;600;700&display=swap');

  :root{
    --steel-0:#14181c;
    --steel-1:#1d2328;
    --steel-2:#262e34;
    --steel-3:#2f383f;
    --line:#3a444c;
    --amber:#ff8c2f;
    --amber-dim:#8a5322;
    --text:#eef1f3;
    --text-dim:#8b969e;
    --danger:#ff3b30;
    --danger-dim:#7a2622;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:radial-gradient(circle at 50% -10%, #232a30 0%, var(--steel-0) 55%);
    color:var(--text);
    font-family:'Rubik',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    display:flex;
    justify-content:center;
    padding:24px 16px 60px;
  }
  .app{ width:100%; max-width:460px; }
  .header{ text-align:center; margin-bottom:20px; }
  .eyebrow{
    font-family:'Oswald',sans-serif;
    letter-spacing:.14em;
    font-size:12px;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:26px;
    margin:4px 0 0;
  }

  .toolbar{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .toolbar button{
    flex:1;
    background:var(--steel-1);
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:12px;
    padding:10px;
    font-size:13px;
    cursor:pointer;
    font-family:'Rubik',sans-serif;
  }
  .toolbar button:active{ transform:scale(.97); }
  .toolbar button.active-toggle{ color:var(--amber); border-color:var(--amber-dim); }

  .list-title{
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:.1em;
    text-transform:uppercase;
    margin:0 4px 10px;
  }
  .empty-note{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:26px 10px;
    border:1px dashed var(--line);
    border-radius:14px;
  }

  /* --- פאנל בנק טבחים --- */
  .bank-panel{
    background:linear-gradient(180deg,var(--steel-1),var(--steel-0));
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px;
    margin-bottom:22px;
    position:relative;
    overflow:hidden;
  }
  .bank-panel::before{
    content:"";
    position:absolute; top:0;left:0;right:0; height:4px;
    background:linear-gradient(90deg,transparent,var(--amber),transparent);
    opacity:.6;
  }
  .bank-add-row{ display:flex; gap:8px; margin-bottom:14px; }
  .bank-add-row input{
    flex:1;
    background:var(--steel-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    color:var(--text);
    font-size:15px;
    font-family:'Rubik',sans-serif;
    outline:none;
  }
  .bank-add-row input:focus{ border-color:var(--amber-dim); }
  .bank-add-row input::placeholder{ color:var(--text-dim); }
  .bank-add-row button{
    flex:none;
    background:var(--amber);
    color:#1a1005;
    border:none;
    border-radius:12px;
    padding:0 18px;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
  }
  .bank-add-row button:active{ transform:scale(.95); }

  .bank-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 4px;
    border-bottom:1px solid var(--line);
  }
  .bank-row:last-child{ border-bottom:none; }
  .bank-row-name{ flex:1; font-size:14px; }
  .shift-toggle{
    flex:none;
    border:1px solid var(--line);
    background:var(--steel-2);
    color:var(--text-dim);
    border-radius:10px;
    padding:7px 12px;
    font-size:12px;
    cursor:pointer;
  }
  .shift-toggle.on{
    background:var(--amber);
    color:#1a1005;
    border:none;
    font-weight:600;
  }
  .bank-delete{
    flex:none;
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-size:17px;
    cursor:pointer;
    padding:4px 6px;
  }
  .bank-delete:hover{ color:var(--danger); }
  .bank-delete:disabled{ opacity:.3; cursor:not-allowed; }
  .shift-toggle:disabled{ opacity:.4; cursor:not-allowed; }

  .notify-row{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
    text-align:center;
  }
  .notify-btn{
    background:var(--steel-2);
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:10px;
    padding:9px 16px;
    font-size:13px;
    cursor:pointer;
  }
  .notify-btn.granted{ color:var(--amber); border-color:var(--amber-dim); }

  /* --- כרטיסי משמרת --- */
  .cards{ display:flex; flex-direction:column; gap:12px; }

  .card{
    background:linear-gradient(180deg,var(--steel-1),var(--steel-0));
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 12px 26px -16px rgba(0,0,0,.5);
  }
  .card.is-done{
    border-color:var(--danger-dim);
    background:linear-gradient(180deg,#2a1a17,var(--steel-0));
  }

  .card-row{ display:flex; align-items:center; gap:14px; cursor:pointer; }
  .card-row.no-click{ cursor:default; }

  .ring-mini{ position:relative; width:56px; height:56px; flex:none; }
  .ring-mini svg{ transform:rotate(-90deg); }
  .ring-mini-bg{ fill:none; stroke:var(--steel-2); stroke-width:6; }
  .ring-mini-fg{ fill:none; stroke:var(--amber); stroke-width:6; stroke-linecap:round; }
  .ring-mini-fg.overtime{ stroke:var(--danger); animation:glow 1.4s ease-in-out infinite; }
  @keyframes glow{
    0%,100%{ opacity:1; }
    50%{ opacity:.55; }
  }
  .ring-mini-num{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif;
    font-size:11px;
    font-variant-numeric:tabular-nums;
  }
  .ring-mini-num.overtime{ color:var(--danger); font-weight:700; }

  .avatar{
    width:56px; height:56px; flex:none;
    border-radius:50%;
    background:var(--steel-2);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif;
    font-size:20px;
    font-weight:600;
    color:var(--amber);
  }

  .card-body{ flex:1; min-width:0; }
  .card-title{ font-size:15px; font-weight:600; margin-bottom:2px; }
  .card-sub{ font-size:12px; color:var(--text-dim); }
  .card.is-done .card-sub{ color:var(--danger); }

  .card-action{
    flex:none;
    border:1px solid var(--line);
    background:transparent;
    color:var(--text-dim);
    border-radius:10px;
    padding:9px 14px;
    font-size:13px;
    cursor:pointer;
  }
  .card-action:hover{ border-color:var(--danger); color:var(--danger); }
  .card.is-done .card-action{
    background:var(--danger);
    color:#fff;
    border:none;
    font-weight:600;
    animation:pulseBtn 1s ease-in-out infinite;
  }
  @keyframes pulseBtn{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,59,48,.5); }
    50%{ box-shadow:0 0 0 10px rgba(255,59,48,0); }
  }

  .duration-row{
    display:flex;
    gap:10px;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .duration-btn{
    flex:1;
    background:var(--steel-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 6px;
    color:var(--text);
    cursor:pointer;
    text-align:center;
  }
  .duration-btn:hover{ border-color:var(--amber-dim); background:#2b333a; }
  .duration-btn:active{ transform:scale(.95); }
  .duration-num{
    font-family:'Oswald',sans-serif;
    font-size:20px; font-weight:700; color:var(--amber);
    display:block; line-height:1;
  }
  .duration-label{ font-size:11px; color:var(--text-dim); margin-top:3px; display:block; }
  .duration-cancel{
    flex:none;
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:12px;
    padding:0 16px;
    cursor:pointer;
  }

  .wake-note{
    text-align:center;
    font-size:11px;
    color:var(--text-dim);
    margin-top:18px;
    opacity:.7;
  }

  .hidden{ display:none !important; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="eyebrow">ניהול מטבח</div>
    <h1>הפסקות טבחים</h1>
  </div>

  <div class="toolbar">
    <button id="toggleBankBtn">ניהול בנק טבחים</button>
  </div>

  <div id="bankPanel" class="bank-panel hidden">
    <div class="bank-add-row">
      <input id="chefNameInput" type="text" placeholder="שם טבח חדש...">
      <button id="addChefBtn">+</button>
    </div>
    <div id="bankList"></div>

    <div class="notify-row">
      <button id="notifyBtn" class="notify-btn">אפשר התראות מערכת</button>
    </div>
  </div>

  <div class="list-title">המשמרת הנוכחית</div>
  <div id="emptyNote" class="empty-note">אין טבחים במשמרת - פתח את "ניהול בנק טבחים" והוסף למשמרת</div>
  <div id="cards" class="cards"></div>

  <div class="wake-note">המסך יישאר דלוק כל עוד יש הפסקה פעילה</div>
</div>

<script>
  const cardsEl = document.getElementById('cards');
  const emptyNote = document.getElementById('emptyNote');
  const chefNameInput = document.getElementById('chefNameInput');
  const addChefBtn = document.getElementById('addChefBtn');
  const toggleBankBtn = document.getElementById('toggleBankBtn');
  const bankPanel = document.getElementById('bankPanel');
  const bankList = document.getElementById('bankList');
  const notifyBtn = document.getElementById('notifyBtn');

  const RADIUS_MINI = 24;
  const CIRC_MINI = 2 * Math.PI * RADIUS_MINI;

  const BANK_KEY = 'chefBank_v2';
  const BREAKS_KEY = 'chefBreaks_v2';

  // בנק: { id, name, onShift }
  let bank = [];
  let nextId = 1;
  // הפסקות פעילות/שהסתיימו: id -> { minutes, endAt }  (endAt = חותמת זמן epoch ms)
  let breaksState = {};
  // מצבי "בחירת משך" זמניים - לא נשמרים
  let choosingIds = new Set();
  // מעקב מצב קודם לכל טבח, כדי לדעת מתי לבצע רינדור מלא מול עדכון קל בלבד
  let prevMode = {};
  // רפרנסים ל-DOM לעדכון קל מדי שנייה בלי לפרק/לבנות מחדש
  let liveRefs = {};
  // לולאות צפצוף פעילות
  let beepTimers = {};

  let audioCtx = null;
  let wakeLock = null;
  let tickInterval = null;

  // ---------- אחסון ----------
  function loadBank(){
    try{
      const raw = localStorage.getItem(BANK_KEY);
      if(raw) bank = JSON.parse(raw);
      nextId = bank.length ? Math.max(...bank.map(c=>c.id)) + 1 : 1;
    } catch(e){ bank = []; }
  }
  function saveBank(){
    try{ localStorage.setItem(BANK_KEY, JSON.stringify(bank)); } catch(e){}
  }
  function loadBreaks(){
    try{
      const raw = localStorage.getItem(BREAKS_KEY);
      breaksState = raw ? JSON.parse(raw) : {};
    } catch(e){ breaksState = {}; }
  }
  function saveBreaks(){
    try{ localStorage.setItem(BREAKS_KEY, JSON.stringify(breaksState)); } catch(e){}
  }

  function initials(name){
    const parts = name.trim().split(/\s+/);
    if(parts.length === 1) return parts[0].slice(0,2);
    return parts[0][0] + parts[1][0];
  }

  // ---------- בנק טבחים ----------
  toggleBankBtn.addEventListener('click', ()=>{
    bankPanel.classList.toggle('hidden');
    toggleBankBtn.classList.toggle('active-toggle');
    if(!bankPanel.classList.contains('hidden')) renderBank();
  });

  addChefBtn.addEventListener('click', addChef);
  chefNameInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter') addChef(); });

  function addChef(){
    const name = chefNameInput.value.trim();
    if(!name) return;
    bank.push({ id: nextId++, name, onShift: true });
    chefNameInput.value = '';
    saveBank();
    renderBank();
    renderShift();
  }

  function hasActiveBreak(id){
    return !!breaksState[id];
  }

  function toggleShift(id){
    const c = bank.find(x=>x.id===id);
    if(!c) return;
    if(c.onShift && hasActiveBreak(id)){
      return; // אי אפשר להוציא ממשמרת באמצע הפסקה פעילה
    }
    c.onShift = !c.onShift;
    saveBank();
    renderBank();
    renderShift();
  }

  function deleteFromBank(id){
    if(hasActiveBreak(id)) return; // אי אפשר למחוק באמצע הפסקה פעילה
    bank = bank.filter(x=>x.id!==id);
    saveBank();
    renderBank();
    renderShift();
  }

  function renderBank(){
    bankList.innerHTML = '';
    if(bank.length === 0){
      bankList.innerHTML = '<div class="empty-note">הבנק ריק - הוסף טבח למעלה</div>';
      return;
    }
    bank.forEach(c=>{
      const locked = hasActiveBreak(c.id);
      const row = document.createElement('div');
      row.className = 'bank-row';
      row.innerHTML = `
        <div class="bank-row-name">${c.name}</div>
        <button class="shift-toggle ${c.onShift ? 'on':''}" data-toggle-id="${c.id}" ${locked?'disabled':''}>
          ${c.onShift ? '✓ במשמרת' : 'הוסף למשמרת'}
        </button>
        <button class="bank-delete" data-delete-id="${c.id}" ${locked?'disabled':''} title="מחק מהבנק">✕</button>
      `;
      bankList.appendChild(row);
    });
    bankList.querySelectorAll('[data-toggle-id]').forEach(btn=>{
      btn.addEventListener('click', ()=> toggleShift(parseInt(btn.dataset.toggleId,10)));
    });
    bankList.querySelectorAll('[data-delete-id]').forEach(btn=>{
      btn.addEventListener('click', ()=> deleteFromBank(parseInt(btn.dataset.deleteId,10)));
    });
  }

  // ---------- התראות מערכת ----------
  function refreshNotifyBtn(){
    if(!('Notification' in window)){
      notifyBtn.style.display = 'none';
      return;
    }
    if(Notification.permission === 'granted'){
      notifyBtn.textContent = '✓ התראות פעילות';
      notifyBtn.classList.add('granted');
    } else if(Notification.permission === 'denied'){
      notifyBtn.textContent = 'התראות חסומות בדפדפן';
      notifyBtn.disabled = true;
    } else {
      notifyBtn.textContent = 'אפשר התראות מערכת';
      notifyBtn.classList.remove('granted');
    }
  }
  notifyBtn.addEventListener('click', async ()=>{
    if(!('Notification' in window)) return;
    try{ await Notification.requestPermission(); } catch(e){}
    refreshNotifyBtn();
  });

  function fireDoneAlert(chefName){
    if('Notification' in window && Notification.permission === 'granted'){
      try{
        new Notification('ההפסקה הסתיימה', { body: `${chefName} - הזמן נגמר`, tag: 'chef-break-'+chefName });
      } catch(e){}
    }
    if('vibrate' in navigator){
      try{ navigator.vibrate([250,120,250,120,250]); } catch(e){}
    }
  }

  // ---------- ניהול הפסקות ----------
  function openChoice(id){
    if(hasActiveBreak(id)) return;
    choosingIds.add(id);
    renderShift();
  }
  function closeChoice(id){
    choosingIds.delete(id);
    renderShift();
  }

  function startBreak(id, minutes){
    ensureAudio();
    choosingIds.delete(id);
    breaksState[id] = { minutes, endAt: Date.now() + minutes*60000 };
    saveBreaks();
    renderShift();
    updateWakeLock();
  }

  function cancelBreak(id){
    stopBeepFor(id);
    delete breaksState[id];
    saveBreaks();
    renderShift();
    updateWakeLock();
  }

  // מאשר שראה שההפסקה הסתיימה - עוצר צפצוף ומאפס
  function acknowledgeDone(id){
    stopBeepFor(id);
    delete breaksState[id];
    saveBreaks();
    renderShift();
    updateWakeLock();
  }

  function computeMode(id){
    if(choosingIds.has(id)) return 'choosing';
    const b = breaksState[id];
    if(!b) return 'idle';
    return (Date.now() >= b.endAt) ? 'done' : 'running';
  }

  // ---------- רינדור מבני (רק כשמשהו משמעותי משתנה) ----------
  function renderShift(){
    const shiftChefs = bank.filter(c=>c.onShift);
    cardsEl.innerHTML = '';
    liveRefs = {};
    emptyNote.style.display = shiftChefs.length ? 'none' : 'block';

    shiftChefs.forEach(c=>{
      const mode = computeMode(c.id);
      prevMode[c.id] = mode;
      const card = buildCard(c, mode);
      cardsEl.appendChild(card);
    });

    bindShiftEvents();
  }

  function buildCard(c, mode){
    const card = document.createElement('div');
    card.className = 'card' + (mode==='done' ? ' is-done' : '');
    card.dataset.chefId = c.id;

    let avatarHtml, subText, actionHtml = '';

    if(mode === 'running' || mode === 'done'){
      const b = breaksState[c.id];
      let numText, offset, ringClass='', numClass='';
      if(mode === 'running'){
        const remaining = Math.max(0, Math.round((b.endAt - Date.now())/1000));
        const m = Math.floor(remaining/60).toString().padStart(2,'0');
        const s = Math.floor(remaining%60).toString().padStart(2,'0');
        numText = m+':'+s;
        offset = CIRC_MINI * (1 - remaining / (b.minutes*60));
        subText = `בהפסקה (${b.minutes} דק')`;
      } else {
        const overtime = Math.max(0, Math.round((Date.now() - b.endAt)/1000));
        const m = Math.floor(overtime/60).toString().padStart(2,'0');
        const s = Math.floor(overtime%60).toString().padStart(2,'0');
        numText = '+'+m+':'+s;
        offset = 0;
        ringClass = 'overtime';
        numClass = 'overtime';
        subText = 'הזמן נגמר - חורג';
      }
      avatarHtml = `
        <div class="ring-mini">
          <svg width="56" height="56">
            <circle class="ring-mini-bg" cx="28" cy="28" r="${RADIUS_MINI}"></circle>
            <circle class="ring-mini-fg ${ringClass}" cx="28" cy="28" r="${RADIUS_MINI}"
              stroke-dasharray="${CIRC_MINI}" stroke-dashoffset="${offset}"></circle>
          </svg>
          <div class="ring-mini-num ${numClass}">${numText}</div>
        </div>`;
      actionHtml = `<button class="card-action" data-id="${c.id}" data-action="${mode==='done'?'ack':'cancel'}">
        ${mode==='done' ? 'אישור' : 'בטל'}
      </button>`;
    } else {
      avatarHtml = `<div class="avatar">${initials(c.name)}</div>`;
      subText = mode === 'choosing' ? 'בחר משך הפסקה' : 'זמין - לחץ להתחלת הפסקה';
    }

    const rowClickable = mode === 'idle';
    card.innerHTML = `
      <div class="card-row ${rowClickable ? '' : 'no-click'}" ${rowClickable ? `data-open-id="${c.id}"` : ''}>
        ${avatarHtml}
        <div class="card-body">
          <div class="card-title">${c.name}</div>
          <div class="card-sub">${subText}</div>
        </div>
        ${actionHtml}
      </div>
      ${mode === 'choosing' ? `
        <div class="duration-row">
          <button class="duration-btn" data-start-id="${c.id}" data-min="20">
            <span class="duration-num">20</span><span class="duration-label">דקות</span>
          </button>
          <button class="duration-btn" data-start-id="${c.id}" data-min="30">
            <span class="duration-num">30</span><span class="duration-label">דקות</span>
          </button>
          <button class="duration-cancel" data-close-id="${c.id}">ביטול</button>
        </div>
      ` : ''}
    `;

    if(mode === 'running' || mode === 'done'){
      liveRefs[c.id] = {
        ringFg: card.querySelector('.ring-mini-fg'),
        numEl: card.querySelector('.ring-mini-num'),
        subEl: card.querySelector('.card-sub')
      };
    }

    return card;
  }

  function bindShiftEvents(){
    cardsEl.querySelectorAll('[data-open-id]').forEach(el=>{
      el.addEventListener('click', ()=> openChoice(parseInt(el.dataset.openId,10)));
    });
    cardsEl.querySelectorAll('[data-start-id]').forEach(el=>{
      el.addEventListener('click', ()=> startBreak(parseInt(el.dataset.startId,10), parseInt(el.dataset.min,10)));
    });
    cardsEl.querySelectorAll('[data-close-id]').forEach(el=>{
      el.addEventListener('click', ()=> closeChoice(parseInt(el.dataset.closeId,10)));
    });
    cardsEl.querySelectorAll('.card-action').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = parseInt(btn.dataset.id, 10);
        if(btn.dataset.action === 'cancel') cancelBreak(id);
        else acknowledgeDone(id);
      });
    });
  }

  // ---------- טיק שקט - לא בונה מחדש, רק מעדכן טקסט/טבעת ----------
  function tick(){
    const shiftChefs = bank.filter(c=>c.onShift);
    let needsStructuralRebuild = false;

    shiftChefs.forEach(c=>{
      const mode = computeMode(c.id);
      const prev = prevMode[c.id];

      if(mode !== prev){
        // מעבר בין מצבים (למשל running -> done) - טעון רינדור מבני מלא
        if(prev === 'running' && mode === 'done'){
          fireDoneAlert(c.name);
          startBeepFor(c.id);
        }
        needsStructuralRebuild = true;
        return;
      }

      // אין שינוי מצב - עדכון קל בלבד דרך הרפרנסים השמורים
      if((mode === 'running' || mode === 'done') && liveRefs[c.id]){
        const b = breaksState[c.id];
        const refs = liveRefs[c.id];
        if(mode === 'running'){
          const remaining = Math.max(0, Math.round((b.endAt - Date.now())/1000));
          const m = Math.floor(remaining/60).toString().padStart(2,'0');
          const s = Math.floor(remaining%60).toString().padStart(2,'0');
          refs.numEl.textContent = m+':'+s;
          const offset = CIRC_MINI * (1 - remaining / (b.minutes*60));
          refs.ringFg.style.strokeDashoffset = offset;
        } else {
          const overtime = Math.max(0, Math.round((Date.now() - b.endAt)/1000));
          const m = Math.floor(overtime/60).toString().padStart(2,'0');
          const s = Math.floor(overtime%60).toString().padStart(2,'0');
          refs.numEl.textContent = '+'+m+':'+s;
        }
      }
    });

    if(needsStructuralRebuild) renderShift();
  }

  // ---------- אודיו ----------
  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beepOnce(){
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.35);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  }
  function startBeepFor(id){
    if(beepTimers[id]) return;
    const loop = ()=>{
      if(!breaksState[id]){ delete beepTimers[id]; return; }
      beepOnce();
      beepTimers[id] = setTimeout(loop, 700);
    };
    loop();
  }
  function stopBeepFor(id){
    if(beepTimers[id]){
      clearTimeout(beepTimers[id]);
      delete beepTimers[id];
    }
  }

  // ---------- נעילת מסך ----------
  async function updateWakeLock(){
    const activeCount = Object.keys(breaksState).length;
    try{
      if(activeCount > 0){
        if(!wakeLock && 'wakeLock' in navigator){
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', ()=>{ wakeLock = null; });
        }
      } else if(wakeLock){
        await wakeLock.release();
        wakeLock = null;
      }
    } catch(e){}
  }
  document.addEventListener('visibilitychange', ()=>{
    if(document.visibilityState === 'visible' && Object.keys(breaksState).length > 0){
      updateWakeLock();
      // אם היינו ברקע וטיימר כבר הסתיים - נוודא שהצפצוף רץ
      Object.keys(breaksState).forEach(id=>{
        if(computeMode(parseInt(id,10)) === 'done') startBeepFor(parseInt(id,10));
      });
    }
  });

  // ---------- אתחול ----------
  loadBank();
  loadBreaks();
  bank.forEach(c=>{ prevMode[c.id] = computeMode(c.id); });
  renderBank();
  renderShift();
  refreshNotifyBtn();
  updateWakeLock();

  // אם נטען מחדש כשכבר יש הפסקה שהסתיימה - נתחיל את הצפצוף (יתעורר בפועל אחרי אינטראקציה ראשונה עם הדף)
  Object.keys(breaksState).forEach(id=>{
    if(computeMode(parseInt(id,10)) === 'done') startBeepFor(parseInt(id,10));
  });
  document.body.addEventListener('click', ensureAudio, { once:true });

  tickInterval = setInterval(tick, 1000);

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
</script>

</body>
