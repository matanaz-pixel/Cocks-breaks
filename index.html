<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>הפסקות טבחים</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1d2328">

<!-- iOS: הוספה למסך הבית כאפליקציה במסך מלא -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="הפסקות טבח">
<link rel="apple-touch-icon" href="./icon-192.png">

<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&family=Oswald:wght@500;600;700&display=swap');

  :root{
    --steel-0:#14181c;
    --steel-1:#1d2328;
    --steel-2:#262e34;
    --steel-3:#2f383f;
    --line:#3a444c;
    --amber:#ff8c2f;
    --amber-dim:#8a5322;
    --text:#eef1f3;
    --text-dim:#8b969e;
    --danger:#ff3b30;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    min-height:100%;
    background:radial-gradient(circle at 50% -10%, #232a30 0%, var(--steel-0) 55%);
    color:var(--text);
    font-family:'Rubik',sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  body{
    display:flex;
    justify-content:center;
    padding:24px 16px 60px;
  }
  .app{
    width:100%;
    max-width:460px;
  }
  .header{
    text-align:center;
    margin-bottom:22px;
  }
  .eyebrow{
    font-family:'Oswald',sans-serif;
    letter-spacing:.14em;
    font-size:12px;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:26px;
    margin:4px 0 0;
  }

  .add-chef{
    background:linear-gradient(180deg,var(--steel-1),var(--steel-0));
    border:1px solid var(--line);
    border-radius:18px;
    padding:14px;
    box-shadow:0 20px 40px -18px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.03);
    margin-bottom:22px;
    display:flex;
    gap:8px;
    position:relative;
    overflow:hidden;
  }
  .add-chef::before{
    content:"";
    position:absolute; top:0;left:0;right:0; height:4px;
    background:linear-gradient(90deg,transparent,var(--amber),transparent);
    opacity:.6;
  }
  .add-chef input{
    flex:1;
    background:var(--steel-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    color:var(--text);
    font-size:15px;
    font-family:'Rubik',sans-serif;
    outline:none;
  }
  .add-chef input:focus{ border-color:var(--amber-dim); }
  .add-chef input::placeholder{ color:var(--text-dim); }
  .add-chef button{
    flex:none;
    background:var(--amber);
    color:#1a1005;
    border:none;
    border-radius:12px;
    padding:0 18px;
    font-size:20px;
    font-weight:700;
    cursor:pointer;
  }
  .add-chef button:active{ transform:scale(.95); }

  .list-title{
    font-size:12px;
    color:var(--text-dim);
    letter-spacing:.1em;
    text-transform:uppercase;
    margin:0 4px 10px;
  }
  .empty-note{
    text-align:center;
    color:var(--text-dim);
    font-size:14px;
    padding:30px 10px;
    border:1px dashed var(--line);
    border-radius:14px;
  }

  .cards{ display:flex; flex-direction:column; gap:12px; }

  .card{
    background:linear-gradient(180deg,var(--steel-1),var(--steel-0));
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    box-shadow:0 12px 26px -16px rgba(0,0,0,.5);
    animation:slideIn .25s ease;
  }
  @keyframes slideIn{
    from{ opacity:0; transform:translateY(-6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .card.is-done{
    border-color:var(--amber-dim);
    background:linear-gradient(180deg,#2a2117,var(--steel-0));
  }

  .card-row{
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
  }
  .card-row.no-click{ cursor:default; }

  .ring-mini{ position:relative; width:56px; height:56px; flex:none; }
  .ring-mini svg{ transform:rotate(-90deg); }
  .ring-mini-bg{ fill:none; stroke:var(--steel-2); stroke-width:6; }
  .ring-mini-fg{ fill:none; stroke:var(--amber); stroke-width:6; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
  .ring-mini-num{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif;
    font-size:12px;
    font-variant-numeric:tabular-nums;
  }
  .avatar{
    width:56px; height:56px; flex:none;
    border-radius:50%;
    background:var(--steel-2);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif;
    font-size:20px;
    font-weight:600;
    color:var(--amber);
  }

  .card-body{ flex:1; min-width:0; }
  .card-title{
    font-size:15px;
    font-weight:600;
    margin-bottom:2px;
  }
  .card-sub{
    font-size:12px;
    color:var(--text-dim);
  }
  .card.is-done .card-sub{ color:var(--amber); }

  .card-action{
    flex:none;
    border:1px solid var(--line);
    background:transparent;
    color:var(--text-dim);
    border-radius:10px;
    padding:9px 14px;
    font-size:13px;
    cursor:pointer;
  }
  .card-action:hover{ border-color:var(--danger); color:var(--danger); }
  .card.is-done .card-action{
    background:var(--amber);
    color:#1a1005;
    border:none;
    font-weight:600;
    animation:pulseBtn 1s ease-in-out infinite;
  }
  @keyframes pulseBtn{
    0%,100%{ box-shadow:0 0 0 0 rgba(255,140,47,.5); }
    50%{ box-shadow:0 0 0 10px rgba(255,140,47,0); }
  }

  .remove-chef{
    flex:none;
    background:transparent;
    border:none;
    color:var(--text-dim);
    font-size:18px;
    cursor:pointer;
    padding:4px 6px;
  }
  .remove-chef:hover{ color:var(--danger); }

  .duration-row{
    display:flex;
    gap:10px;
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .duration-btn{
    flex:1;
    background:var(--steel-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 6px;
    color:var(--text);
    cursor:pointer;
    text-align:center;
  }
  .duration-btn:hover{ border-color:var(--amber-dim); background:#2b333a; }
  .duration-btn:active{ transform:scale(.95); }
  .duration-num{
    font-family:'Oswald',sans-serif;
    font-size:20px; font-weight:700; color:var(--amber);
    display:block; line-height:1;
  }
  .duration-label{ font-size:11px; color:var(--text-dim); margin-top:3px; display:block; }
  .duration-cancel{
    flex:none;
    background:transparent;
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:12px;
    padding:0 16px;
    cursor:pointer;
  }

  .wake-note{
    text-align:center;
    font-size:11px;
    color:var(--text-dim);
    margin-top:18px;
    opacity:.7;
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="eyebrow">ניהול מטבח</div>
    <h1>הפסקות טבחים</h1>
  </div>

  <div class="add-chef">
    <input id="chefNameInput" type="text" placeholder="שם הטבח...">
    <button id="addChefBtn">+</button>
  </div>

  <div class="list-title">צוות המטבח</div>
  <div id="emptyNote" class="empty-note">עדיין לא הוספת טבחים - הוסף למעלה</div>
  <div id="cards" class="cards"></div>

  <div class="wake-note">המסך יישאר דלוק כל עוד יש הפסקה פעילה</div>
</div>

<script>
  const cardsEl = document.getElementById('cards');
  const emptyNote = document.getElementById('emptyNote');
  const chefNameInput = document.getElementById('chefNameInput');
  const addChefBtn = document.getElementById('addChefBtn');

  const RADIUS_MINI = 24;
  const CIRC_MINI = 2 * Math.PI * RADIUS_MINI;
  const STORAGE_KEY = 'chefBreaksRoster';

  let chefs = [];
  let nextId = 1;
  let audioCtx = null;
  let wakeLock = null;

  function loadRoster(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const saved = JSON.parse(raw);
        chefs = saved.map(c => ({
          id: c.id, name: c.name, status: 'idle',
          minutes: 0, totalSeconds: 0, remaining: 0,
          intervalId: null, beepTimeoutId: null
        }));
        nextId = Math.max(0, ...chefs.map(c=>c.id)) + 1;
      }
    } catch(e){ /* מתעלמים משגיאות אחסון */ }
  }

  function saveRoster(){
    try{
      const toSave = chefs.map(c => ({ id: c.id, name: c.name }));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
    } catch(e){ /* מתעלמים משגיאות אחסון */ }
  }

  function initials(name){
    const parts = name.trim().split(/\s+/);
    if(parts.length === 1) return parts[0].slice(0,2);
    return parts[0][0] + parts[1][0];
  }

  addChefBtn.addEventListener('click', addChef);
  chefNameInput.addEventListener('keydown', (e)=>{
    if(e.key === 'Enter') addChef();
  });

  function addChef(){
    const name = chefNameInput.value.trim();
    if(!name) return;
    chefs.push({
      id: nextId++, name, status: 'idle',
      minutes: 0, totalSeconds: 0, remaining: 0,
      intervalId: null, beepTimeoutId: null
    });
    chefNameInput.value = '';
    saveRoster();
    renderAll();
  }

  function removeChef(id){
    const c = chefs.find(x=>x.id===id);
    if(!c) return;
    clearInterval(c.intervalId);
    clearTimeout(c.beepTimeoutId);
    chefs = chefs.filter(x=>x.id!==id);
    saveRoster();
    renderAll();
  }

  function openChoice(id){
    const c = chefs.find(x=>x.id===id);
    if(!c || c.status !== 'idle') return;
    c.status = 'choosing';
    renderAll();
  }

  function closeChoice(id){
    const c = chefs.find(x=>x.id===id);
    if(!c) return;
    c.status = 'idle';
    renderAll();
  }

  function startBreak(id, minutes){
    const c = chefs.find(x=>x.id===id);
    if(!c) return;
    ensureAudio();
    c.minutes = minutes;
    c.totalSeconds = minutes * 60;
    c.remaining = c.totalSeconds;
    c.status = 'running';

    c.intervalId = setInterval(()=>{
      c.remaining--;
      if(c.remaining <= 0){
        clearInterval(c.intervalId);
        c.remaining = 0;
        c.status = 'done';
        startBeepFor(c);
      }
      renderAll();
    }, 1000);

    renderAll();
    updateWakeLock();
  }

  function cancelBreak(id){
    const c = chefs.find(x=>x.id===id);
    if(!c) return;
    clearInterval(c.intervalId);
    clearTimeout(c.beepTimeoutId);
    c.status = 'idle';
    renderAll();
    updateWakeLock();
  }

  function stopBreak(id){
    const c = chefs.find(x=>x.id===id);
    if(!c) return;
    clearTimeout(c.beepTimeoutId);
    c.status = 'idle';
    renderAll();
    updateWakeLock();
  }

  function renderAll(){
    cardsEl.innerHTML = '';
    emptyNote.style.display = chefs.length ? 'none' : 'block';

    chefs.forEach(c=>{
      const card = document.createElement('div');
      card.className = 'card' + (c.status==='done' ? ' is-done' : '');

      let avatarHtml, subText, actionHtml = '';

      if(c.status === 'running' || c.status === 'done'){
        const fraction = c.status==='done' ? 0 : (c.remaining / c.totalSeconds);
        const offset = CIRC_MINI * (1 - fraction);
        const m = Math.floor(c.remaining/60).toString().padStart(2,'0');
        const s = Math.floor(c.remaining%60).toString().padStart(2,'0');
        avatarHtml = `
          <div class="ring-mini">
            <svg width="56" height="56">
              <circle class="ring-mini-bg" cx="28" cy="28" r="${RADIUS_MINI}"></circle>
              <circle class="ring-mini-fg" cx="28" cy="28" r="${RADIUS_MINI}"
                stroke-dasharray="${CIRC_MINI}" stroke-dashoffset="${offset}"></circle>
            </svg>
            <div class="ring-mini-num">${c.status==='done' ? '⏰' : m+':'+s}</div>
          </div>`;
        subText = c.status==='done' ? 'הזמן נגמר' : `בהפסקה (${c.minutes} דק')`;
        actionHtml = `<button class="card-action" data-id="${c.id}" data-action="${c.status==='done'?'stop':'cancel'}">
          ${c.status==='done' ? 'עצור צפצוף' : 'בטל'}
        </button>`;
      } else {
        avatarHtml = `<div class="avatar">${initials(c.name)}</div>`;
        subText = c.status === 'choosing' ? 'בחר משך הפסקה' : "זמין - לחץ להתחלת הפסקה";
        if(c.status !== 'choosing'){
          actionHtml = `<button class="remove-chef" data-remove-id="${c.id}" title="הסר טבח">✕</button>`;
        }
      }

      const rowClickable = c.status === 'idle';

      card.innerHTML = `
        <div class="card-row ${rowClickable ? '' : 'no-click'}" ${rowClickable ? `data-open-id="${c.id}"` : ''}>
          ${avatarHtml}
          <div class="card-body">
            <div class="card-title">${c.name}</div>
            <div class="card-sub">${subText}</div>
          </div>
          ${actionHtml}
        </div>
        ${c.status === 'choosing' ? `
          <div class="duration-row">
            <button class="duration-btn" data-start-id="${c.id}" data-min="20">
              <span class="duration-num">20</span><span class="duration-label">דקות</span>
            </button>
            <button class="duration-btn" data-start-id="${c.id}" data-min="30">
              <span class="duration-num">30</span><span class="duration-label">דקות</span>
            </button>
            <button class="duration-cancel" data-close-id="${c.id}">ביטול</button>
          </div>
        ` : ''}
      `;
      cardsEl.appendChild(card);
    });

    cardsEl.querySelectorAll('[data-open-id]').forEach(el=>{
      el.addEventListener('click', ()=> openChoice(parseInt(el.dataset.openId,10)));
    });
    cardsEl.querySelectorAll('[data-start-id]').forEach(el=>{
      el.addEventListener('click', ()=> startBreak(parseInt(el.dataset.startId,10), parseInt(el.dataset.min,10)));
    });
    cardsEl.querySelectorAll('[data-close-id]').forEach(el=>{
      el.addEventListener('click', ()=> closeChoice(parseInt(el.dataset.closeId,10)));
    });
    cardsEl.querySelectorAll('[data-remove-id]').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        removeChef(parseInt(el.dataset.removeId,10));
      });
    });
    cardsEl.querySelectorAll('.card-action').forEach(btn=>{
      btn.addEventListener('click', (e)=>{
        e.stopPropagation();
        const id = parseInt(btn.dataset.id, 10);
        if(btn.dataset.action === 'cancel') cancelBreak(id);
        else stopBreak(id);
      });
    });
  }

  function ensureAudio(){
    if(!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioCtx.state === 'suspended'){
      audioCtx.resume();
    }
  }

  function beepOnce(){
    ensureAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.35);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
  }

  function startBeepFor(c){
    const loop = ()=>{
      const stillDone = chefs.find(x=>x.id===c.id && x.status==='done');
      if(!stillDone) return;
      beepOnce();
      c.beepTimeoutId = setTimeout(loop, 700);
    };
    loop();
  }

  async function updateWakeLock(){
    const activeCount = chefs.filter(c=>c.status==='running' || c.status==='done').length;
    try{
      if(activeCount > 0){
        if(!wakeLock && 'wakeLock' in navigator){
          wakeLock = await navigator.wakeLock.request('screen');
          wakeLock.addEventListener('release', ()=>{ wakeLock = null; });
        }
      } else {
        if(wakeLock){
          await wakeLock.release();
          wakeLock = null;
        }
      }
    } catch(e){
      // מכשירים/דפדפנים ללא תמיכה - מתעלמים בשקט
    }
  }

  document.addEventListener('visibilitychange', ()=>{
    const activeCount = chefs.filter(c=>c.status==='running' || c.status==='done').length;
    if(document.visibilityState === 'visible' && activeCount > 0){
      updateWakeLock();
    }
  });

  loadRoster();
  renderAll();

  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    });
  }
</script>

</body>
</html>
